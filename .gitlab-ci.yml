stages:
  - build

variables:
  IMAGE_NAME: "lehrstuhlkesdogan/praktomat"
  DEFAULT_BASE_TAG: "jdk21-noble"

build-and-push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_DRIVER: overlay2
  before_script:
    - git config --global url."https://${CI_REPO_USER}:${CI_REPO_TOKEN}@gitlab.itsec.ur.de/".insteadOf "https://gitlab.itsec.ur.de/"
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    |
    if [ -z "$VERSION" ]; then echo "ERROR: VERSION is required"; exit 1; fi
    BASE_TAG="${BASE_TAG:-$DEFAULT_BASE_TAG}"
    FULL_TAG="$BASE_TAG-$VERSION"
    git clone https://gitlab.itsec.ur.de/lehrstuhl/develop/praktomat-docker.git
    echo "Building image: $IMAGE_NAME:$FULL_TAG"
    docker build -t "$IMAGE_NAME:$FULL_TAG" .
    docker push "$IMAGE_NAME:$FULL_TAG"
  only:
    - web
