services:
  praktomat:
    container_name: ${PRAKTOMAT_ID}_praktomat
    image: lehrstuhlkesdogan/praktomat:latest
    ports:
      - 80:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    links:
      - db
    depends_on:
      - db
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_HOST
      - POSTGRES_PORT
      - PRAKTOMAT_ID
      - PRAKTOMAT_NAME
      - PRAKTOMAT_DOMAIN
      - PRAKTOMAT_ADMIN
    init: true

    secrets:
      - db_pass

  db:
    container_name: ${PRAKTOMAT_ID}_db
    image: postgres:18.3-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=${POSTGRES_PASSWORD}
    secrets:
      - db_pass

secrets:
  db_pass:
    file: db_pass.txt